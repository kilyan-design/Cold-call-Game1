<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Cold Call Game</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0C0C0C;--surface:#161616;--surface2:#1E1E1E;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --gold:#D4A853;--gold-dim:rgba(212,168,83,0.13);--gold-mid:rgba(212,168,83,0.35);
  --text:#F0EAE0;--dim:rgba(240,234,224,0.38);--dim2:rgba(240,234,224,0.18);
  --green:#3DBE6E;--green-dim:rgba(61,190,110,0.15);
  --red:#E05252;--red-dim:rgba(224,82,82,0.15);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden;}

/* ═══ SCREENS ═══ */
.screen{position:absolute;inset:0;display:none;flex-direction:column;height:100dvh;}
.screen.active{display:flex;}

/* ─── STATS BAR ─── */
.stats-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px 10px;border-bottom:1px solid var(--border);
  flex-shrink:0;background:var(--bg);
}
.stat-pill{
  display:flex;align-items:center;gap:6px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:5px 12px;
}
.stat-pill .ico{font-size:12px;}
.stat-pill .val{font-size:11px;font-weight:500;letter-spacing:.03em;}
.stat-pill.rdv .val{color:var(--green);}
.stat-pill.calls .val{color:var(--gold);}
.stat-pill.streak .val{color:#E07A34;}

/* ─── HOME ─── */
#home{justify-content:center;align-items:center;padding:40px 28px;}
.home-brand{font-size:9px;font-weight:500;letter-spacing:.35em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;text-align:center;}
.home-title{font-family:'DM Serif Display',serif;font-size:42px;line-height:1.05;text-align:center;margin-bottom:8px;}
.home-title em{font-style:italic;color:var(--gold);}
.home-sub{font-size:13px;color:var(--dim);text-align:center;margin-bottom:48px;font-weight:300;line-height:1.6;}
.cta-main{
  width:100%;padding:20px;border-radius:16px;
  background:var(--gold);color:#0C0C0C;
  font-family:'DM Sans',sans-serif;font-size:16px;font-weight:700;
  border:none;cursor:pointer;letter-spacing:.03em;
  transition:transform .1s,opacity .1s;
}
.cta-main:active{transform:scale(.97);}
.home-stats{display:flex;gap:12px;margin-top:24px;width:100%;}
.hs{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;}
.hs-val{font-family:'DM Serif Display',serif;font-size:28px;color:var(--gold);line-height:1;}
.hs-label{font-size:9px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);margin-top:4px;}

/* ─── CHOOSE INTRO ─── */
#choose-intro .screen-header{
  padding:18px 20px 14px;border-bottom:1px solid var(--border);flex-shrink:0;
  display:flex;align-items:center;gap:12px;
}
.back-btn{
  width:36px;height:36px;border-radius:50%;background:var(--surface);
  border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
  font-size:20px;color:var(--text);cursor:pointer;flex-shrink:0;
}
.sh-title{flex:1;}
.sh-eyebrow{font-size:9px;font-weight:500;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);margin-bottom:2px;}
.sh-name{font-size:15px;font-weight:500;}
.intro-list{flex:1;overflow-y:auto;padding:20px 20px 28px;display:flex;flex-direction:column;gap:9px;}
.intro-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:13px;padding:15px 16px;display:flex;align-items:center;gap:14px;
  cursor:pointer;user-select:none;transition:border-color .15s,background .15s;
}
.intro-card:active{background:var(--surface2);border-color:var(--gold-mid);}
.intro-card.featured{background:var(--gold-dim);border-color:var(--gold-mid);}
.ic-num{font-family:'DM Serif Display',serif;font-size:22px;color:var(--gold);line-height:1;min-width:28px;}
.ic-info{flex:1;}
.ic-tag{font-size:9px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);margin-bottom:3px;}
.ic-name{font-size:14px;font-weight:400;line-height:1.25;}
.ic-arrow{color:var(--dim);font-size:20px;}

/* ─── CALL SCREEN ─── */
#call-screen{background:var(--bg);}
.call-top{
  padding:14px 20px 10px;border-bottom:1px solid var(--border);
  flex-shrink:0;display:flex;align-items:center;gap:10px;
}
.call-back{width:36px;height:36px;border-radius:50%;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;flex-shrink:0;}
.call-meta{flex:1;min-width:0;}
.call-phase{font-size:9px;font-weight:600;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);margin-bottom:1px;}
.call-script-name{font-size:13px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* Progress */
.call-progress{padding:12px 20px 0;flex-shrink:0;display:flex;gap:4px;}
.cp-dot{flex:1;height:2px;border-radius:1px;background:var(--border);transition:background .3s;}
.cp-dot.done{background:var(--gold);}
.cp-dot.active{background:rgba(212,168,83,.45);}

/* Main text area */
.call-content{flex:1;overflow-y:auto;padding:26px 22px 14px;display:flex;flex-direction:column;}
.call-step{flex:1;display:flex;flex-direction:column;animation:sIn .22s ease;}
@keyframes sIn{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:translateX(0)}}
.cs-phase{
  font-size:9px;font-weight:600;letter-spacing:.28em;text-transform:uppercase;
  color:var(--gold);margin-bottom:18px;display:flex;align-items:center;gap:8px;
}
.cs-phase::before{content:'';display:block;width:14px;height:1px;background:var(--gold);}
.cs-text{font-family:'DM Serif Display',serif;font-size:23px;line-height:1.6;flex:1;}
.cs-text em{font-style:italic;color:var(--gold);}
.pause{display:block;font-size:13px;font-style:italic;color:var(--dim);font-family:'DM Sans',sans-serif;font-weight:300;margin:10px 0;}
.hl{background:var(--gold-dim);border-radius:3px;padding:1px 5px;color:var(--gold);}

/* Nav */
.call-nav{padding:14px 20px 26px;flex-shrink:0;border-top:1px solid var(--border);display:flex;gap:9px;}
.cn-btn{flex:1;padding:17px;border-radius:13px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:transform .1s;}
.cn-btn:active{transform:scale(.97);}
.cn-prev{background:var(--surface);border:1px solid var(--border);color:var(--dim);flex:0 0 52px;font-size:20px;}
.cn-next{background:var(--gold);color:#0C0C0C;}
.cn-rdv{background:var(--green);color:#fff;}
.cn-nordv{background:var(--surface);border:1px solid var(--border);color:var(--dim);font-size:13px;}

/* ─── OUTCOME SCREEN ─── */
#outcome{justify-content:center;align-items:center;padding:40px 28px;text-align:center;}
.outcome-icon{font-size:64px;margin-bottom:20px;animation:pop .4s cubic-bezier(.17,.67,.35,1.3);}
@keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
.outcome-title{font-family:'DM Serif Display',serif;font-size:36px;line-height:1.1;margin-bottom:10px;}
.outcome-sub{font-size:14px;color:var(--dim);margin-bottom:32px;line-height:1.6;font-weight:300;}
.outcome-badges{display:flex;gap:10px;margin-bottom:36px;}
.ob{flex:1;border-radius:12px;padding:16px 8px;text-align:center;}
.ob.green{background:var(--green-dim);border:1px solid rgba(61,190,110,.3);}
.ob.gold{background:var(--gold-dim);border:1px solid var(--gold-mid);}
.ob-val{font-family:'DM Serif Display',serif;font-size:30px;line-height:1;}
.ob.green .ob-val{color:var(--green);}
.ob.gold .ob-val{color:var(--gold);}
.ob-label{font-size:9px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);margin-top:5px;}
.outcome-btns{display:flex;flex-direction:column;gap:10px;width:100%;}
.ob-cta{padding:17px;border-radius:13px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;border:none;transition:transform .1s;}
.ob-cta:active{transform:scale(.97);}
.ob-cta.primary{background:var(--gold);color:#0C0C0C;}
.ob-cta.secondary{background:var(--surface);border:1px solid var(--border);color:var(--dim);}

/* ─── MILESTONE toast ─── */
.milestone-toast{
  position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--surface2);border:1px solid var(--gold-mid);
  border-radius:12px;padding:12px 20px;
  display:flex;align-items:center;gap:10px;
  font-size:13px;font-weight:500;white-space:nowrap;
  z-index:999;transition:transform .4s cubic-bezier(.17,.67,.35,1.3);pointer-events:none;
}
.milestone-toast.show{transform:translateX(-50%) translateY(0);}
.mt-icon{font-size:20px;}
</style>
</head>
<body>

<!-- ══ HOME ══ -->
<div class="screen active" id="home">
  <div style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:40px 28px 28px;">
    <p class="home-brand">Cold Call OS</p>
    <h1 class="home-title">Prêt à<br><em>closer ?</em></h1>
    <p class="home-sub">Chaque appel est une partie.<br>Choisis ton intro, suis le script, marque des points.</p>
    <button class="cta-main" onclick="startCall()">📞 Lancer un appel</button>
    <div class="home-stats">
      <div class="hs">
        <div class="hs-val" id="hs-calls">0</div>
        <div class="hs-label">Appels</div>
      </div>
      <div class="hs">
        <div class="hs-val" id="hs-rdv">0</div>
        <div class="hs-label">RDV</div>
      </div>
      <div class="hs">
        <div class="hs-val" id="hs-rate">—</div>
        <div class="hs-label">Taux</div>
      </div>
    </div>
  </div>
</div>

<!-- ══ CHOOSE INTRO ══ -->
<div class="screen" id="choose-intro">
  <div class="stats-bar">
    <div class="stat-pill calls"><span class="ico">📞</span><span class="val" id="sb-calls">0 appels</span></div>
    <div class="stat-pill rdv"><span class="ico">✅</span><span class="val" id="sb-rdv">0 RDV</span></div>
    <div class="stat-pill streak"><span class="ico">🔥</span><span class="val" id="sb-streak">×0</span></div>
  </div>
  <div class="screen-header">
    <div class="back-btn" onclick="show('home')">‹</div>
    <div class="sh-title">
      <p class="sh-eyebrow">Étape 1 sur 2</p>
      <p class="sh-name">Choisis ton intro</p>
    </div>
  </div>
  <div class="intro-list" id="introList"></div>
</div>

<!-- ══ CALL SCREEN ══ -->
<div class="screen" id="call-screen">
  <div class="stats-bar">
    <div class="stat-pill calls"><span class="ico">📞</span><span class="val" id="cs-calls">0 appels</span></div>
    <div class="stat-pill rdv"><span class="ico">✅</span><span class="val" id="cs-rdv">0 RDV</span></div>
    <div class="stat-pill streak"><span class="ico">🔥</span><span class="val" id="cs-streak">×0</span></div>
  </div>
  <div class="call-top">
    <div class="call-back" onclick="show('choose-intro')">‹</div>
    <div class="call-meta">
      <p class="call-phase" id="cs-phase">—</p>
      <p class="call-script-name" id="cs-sname">—</p>
    </div>
  </div>
  <div class="call-progress" id="callProgress"></div>
  <div class="call-content" id="callContent"></div>
  <div class="call-nav" id="callNav"></div>
</div>

<!-- ══ OUTCOME ══ -->
<div class="screen" id="outcome">
  <div id="outcome-inner" style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:36px 28px;text-align:center;width:100%;"></div>
</div>

<!-- MILESTONE TOAST -->
<div class="milestone-toast" id="toast">
  <span class="mt-icon" id="toast-icon">🏆</span>
  <span id="toast-msg">Nouveau palier !</span>
</div>

<script>
// ══ STATE ══
const S = {
  calls: 0,
  rdv: 0,
  streak: 0,
  bestStreak: 0,
  get rate(){ return this.calls===0?'—':Math.round(this.rdv/this.calls*100)+'%' }
};

// ══ SCRIPTS DATA ══
const BASE_STEPS = [
  { phase:'Accroche — Partie 1', text:`Si je vous dis que c'est un <em>appel de prospection</em> vous balancez le téléphone par la fenêtre ou vous me laissez <span class="hl">10 secondes</span> pour expliquer ?` },
  { phase:'Transition', text:`Je vous explique rapidement :<br><br>Je suis tombé sur votre profil sur internet et j'ai vu que vous n'avez <em>pas de site web.</em>` },
  { phase:'Différenciateur', text:`Alors, j'imagine qu'on vous appelle souvent pour ça…<span class="pause">(silence)</span>Oui — la grande différence c'est que <em>j'ai pris la liberté de vous en créer un</em> directement au lieu de vous promettre beaucoup de choses.` },
  { phase:'Closing', text:`Donc si ça vous intéresse je peux vous le montrer…<span class="pause">→ Proposer un créneau</span>`, final:true }
];

const INTROS = [
  {
    num:'✦', tag:'Classique', name:'La Transparence Directe', featured:true,
    steps:[
      { phase:'Ouverture directe', text:`Si je vous dis que c'est un appel de prospection vous jetez le téléphone par la fenêtre ou vous me laissez <span class="hl">10 secondes</span> pour expliquer ?` },
      ...BASE_STEPS.slice(1)
    ]
  },
  {
    num:'02', tag:'Immersion', name:'La Radio',
    steps:[
      { phase:'Action — jingle radio 2 sec 🎵', text:`Pour tenter de remporter un cadeau d'une valeur de <em>1000€</em> quelle est votre radio préférée ?` },
      ...BASE_STEPS
    ]
  },
  {
    num:'03', tag:'+30% RDV', name:'Les Panneaux Solaires',
    steps:[
      { phase:'Accent africain fort 🎭', text:`<em>"EH OUI BONJOUR C'EST POUR LES PANNEAUX SOLAIRES !"</em>` },
      { phase:'Pivot immédiat', text:`Non je plaisante.` },
      ...BASE_STEPS
    ]
  },
  {
    num:'04', tag:'Déstabilisation', name:'Le Robot',
    steps:[
      { phase:'Voix robotique 🤖', text:`<em>"Bonjour. Ceci est un appel concernant votre assurance auto."</em>` },
      { phase:'Pivot', text:`Non je plaisante.` },
      ...BASE_STEPS
    ]
  },
  {
    num:'05', tag:'Légèreté', name:'La Pizzeria',
    steps:[
      { phase:'Ouverture 🍕', text:`<em>"Bonjour, je vais vous commander une margarita et une royale s'il vous plaît. Ça peut être prêt dans combien de temps ?"</em>` },
      ...BASE_STEPS
    ]
  },
  {
    num:'06', tag:'Surprise', name:'Le Loto',
    steps:[
      { phase:'Ouverture 🎰', text:`<em>"Bonjour monsieur, j'ai une excellente nouvelle."</em>` },
      { phase:'Pause + Pivot', text:`<span class="pause">(silence)</span><em>"Non, vous n'avez pas gagné au loto."</em><span class="pause">(pause)</span><em>"Mais vous avez gagné un appel de prospection."</em>` },
      ...BASE_STEPS
    ]
  },
  {
    num:'07', tag:'Flatterie', name:'Le Compliment Suspect',
    steps:[
      { phase:'Ouverture', text:`<em>"Bonjour monsieur, je vous appelle pour vous <span class="hl">féliciter.</span>"</em>` },
      { phase:'Le pique', text:`<span class="pause">(silence)</span><em>"Votre site web est probablement le plus discret d'internet."</em><span class="pause">"Impossible de le trouver."</span>` },
      ...BASE_STEPS
    ]
  },
  {
    num:'08', tag:'Naïveté', name:'Le Stagiaire',
    steps:[
      { phase:'Ouverture 🎓', text:`<em>"Bonjour, je voulais savoir si vous prenez des stagiaires au sein de votre entreprise ?"</em>` },
      { phase:'Pivot', text:`<span class="pause">(silence)</span><em>"Non je rigole."</em>` },
      ...BASE_STEPS
    ]
  },
  {
    num:'09', tag:'Renversement', name:'La Psycho Inversée',
    steps:[
      { phase:'Inversion', text:`<em>"Bonjour, est-ce que vous en avez marre qu'on vous appelle pour vous vendre des sites web ?"</em>` },
      { phase:'Retournement', text:`<span class="pause">(silence)</span><em>"Parfait, je vais régler votre problème."</em>` },
      { phase:'La proposition', text:`<em>"Je vous ai fait un site web. Comme ça vous en aurez un, et on arrêtera de vous appeler — on vous appellera directement pour des devis."</em>` },
      ...BASE_STEPS.slice(2)
    ]
  },
  {
    num:'10', tag:'Générosité', name:'Le Cadeau',
    steps:[
      { phase:'Ouverture 🎁', text:`<em>"Bonjour, j'ai quelque chose qui <span class="hl">vous appartient.</span>"</em>` },
      { phase:'Révélation', text:`<span class="pause">(silence)</span><em>"Et je pense que ça vous sera plus utile à vous qu'à moi."</em><span class="pause">(pause)</span><em>"Un site web tout neuf pour votre entreprise, prêt à être actif dès aujourd'hui."</em>` },
      ...BASE_STEPS.slice(2)
    ]
  },
  {
    num:'B1', tag:'Bonus 1', name:'Les Confrères Débordés',
    steps:[
      { phase:'Accroche', text:`Bonjour, je vous appelle car j'ai déjà contacté <em>3 de vos confrères</em> dans le secteur mais tout le monde déborde de travail, c'est incroyable.` },
      { phase:'Sonder', text:`De votre côté vous pouvez encore prendre des chantiers ou c'est un peu chaud aussi en ce moment ?` },
      { phase:'Question inversée', text:`D'accord donc si je vous dis que j'ai la capacité de vous attirer <span class="hl">5 à 10 nouveaux clients par mois</span> vous seriez contre le fait d'écouter ce que j'ai à vous proposer ?` },
      { phase:'Crédibilité', text:`Pour faire simple, moi c'est Léo et je bosse déjà avec des <em>dizaines de paysagistes</em> à travers la France pour les aider à attirer plus de clients en ligne, on a de très bons résultats.` },
      { phase:'Qualification', text:`Est ce que actuellement on vous appelle souvent via internet ?<span class="pause">Ahh d'accord…</span>` },
      { phase:'Closing', text:`Bah justement <em>j'ai pris la liberté de vous créer un site internet</em> pour régler ce problème, est ce que vous seriez contre le fait de prendre 5 minutes pour savoir si c'est quelque chose avec lequel vous pourriez vous projeter ?<span class="pause">→ Proposer un créneau</span>`, final:true }
    ]
  },
  {
    num:'B2', tag:'Bonus 2', name:"L'Inspecteur",
    steps:[
      { phase:'Autorité 🕵️', text:`Bonjour je suis <em>l'inspecteur [prénom]</em> au bureau de [ville].` },
      { phase:'La gravité', text:`J'ai vu votre nom apparaître sur mon bureau ce matin, <span class="hl">la situation est grave</span> monsieur.` },
      { phase:'La question choc', text:`Vous ne trouvez pas ça <em>criminel</em> qu'une entreprise comme la vôtre qui fait un si bon travail n'ait toujours pas de site web en 2026 monsieur ?` },
      { phase:'Closing', text:`Moi je trouve ça grave donc <em>j'ai pris la liberté de vous créer un site web.</em><span class="pause">→ Proposer un créneau</span>`, final:true }
    ]
  }
];

// ══ CURRENT CALL ══
let curIntro = null, curStep = 0;

// ══ HELPERS ══
function show(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function saveStats(){ localStorage.setItem('ccg',JSON.stringify({calls:S.calls,rdv:S.rdv,streak:S.streak,bestStreak:S.bestStreak})); }
function loadStats(){
  const d=localStorage.getItem('ccg');
  if(d){const p=JSON.parse(d);S.calls=p.calls||0;S.rdv=p.rdv||0;S.streak=p.streak||0;S.bestStreak=p.bestStreak||0;}
}
function updateStatBars(){
  ['sb','cs'].forEach(p=>{
    const ec=document.getElementById(p+'-calls'); if(ec) ec.textContent=S.calls+' appel'+(S.calls!==1?'s':'');
    const er=document.getElementById(p+'-rdv'); if(er) er.textContent=S.rdv+' RDV';
    const es=document.getElementById(p+'-streak'); if(es) es.textContent='×'+S.streak;
  });
  document.getElementById('hs-calls').textContent=S.calls;
  document.getElementById('hs-rdv').textContent=S.rdv;
  document.getElementById('hs-rate').textContent=S.rate;
}

function showToast(icon, msg){
  const t=document.getElementById('toast');
  document.getElementById('toast-icon').textContent=icon;
  document.getElementById('toast-msg').textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

function checkMilestone(prev, cur, field){
  const milestones={ calls:[10,50,100,500,1000], rdv:[1,10,50,100,500] };
  const icons={ calls:'📞', rdv:'🏆' };
  (milestones[field]||[]).forEach(m=>{ if(prev<m && cur>=m) showToast(icons[field], `${m} ${field==='calls'?'appels':'RDV'} atteints ! 🔥`); });
}

// ══ BUILD INTRO LIST ══
function buildIntroList(){
  const list=document.getElementById('introList');
  list.innerHTML='';
  INTROS.forEach((intro,i)=>{
    const el=document.createElement('div');
    el.className='intro-card'+(intro.featured?' featured':'');
    el.innerHTML=`<span class="ic-num">${intro.num}</span><div class="ic-info"><p class="ic-tag">${intro.tag}</p><p class="ic-name">${intro.name}</p></div><span class="ic-arrow">›</span>`;
    el.onclick=()=>launchScript(i);
    list.appendChild(el);
  });
}

// ══ FLOW ══
function startCall(){ updateStatBars(); buildIntroList(); show('choose-intro'); }

function launchScript(idx){
  curIntro=INTROS[idx]; curStep=0;
  document.getElementById('cs-sname').textContent=curIntro.name;
  renderCallStep();
  show('call-screen');
}

function renderCallStep(){
  const steps=curIntro.steps, i=curStep, total=steps.length;
  const step=steps[i];

  // progress
  document.getElementById('callProgress').innerHTML=steps.map((_,j)=>
    `<div class="cp-dot ${j<i?'done':j===i?'active':''}"></div>`).join('');

  document.getElementById('cs-phase').textContent=step.phase;

  // content
  document.getElementById('callContent').innerHTML=
    `<div class="call-step"><p class="cs-phase">${step.phase}</p><div class="cs-text">${step.text}</div></div>`;

  // nav
  const isFinal=step.final===true;
  const isLast=i===total-1;
  let nav=``;
  if(i>0) nav+=`<button class="cn-btn cn-prev" onclick="callPrev()">‹</button>`;

  if(isFinal || isLast){
    nav+=`<button class="cn-btn cn-rdv" onclick="endCall(true)">✅ RDV pris !</button>`;
    nav+=`<button class="cn-btn cn-nordv" onclick="endCall(false)">✗ Pas intéressé</button>`;
    // make them stack
    document.getElementById('callNav').style.flexDirection='column';
  } else {
    document.getElementById('callNav').style.flexDirection='row';
    nav+=`<button class="cn-btn cn-next" onclick="callNext()">Suivant →</button>`;
  }
  document.getElementById('callNav').innerHTML=nav;
  updateStatBars();
}

function callNext(){ if(curStep<curIntro.steps.length-1){curStep++;renderCallStep();} }
function callPrev(){ if(curStep>0){curStep--;renderCallStep();} }

function endCall(isRdv){
  const prevCalls=S.calls, prevRdv=S.rdv;
  S.calls++;
  if(isRdv){ S.rdv++; S.streak++; if(S.streak>S.bestStreak)S.bestStreak=S.streak; }
  else { S.streak=0; }
  checkMilestone(prevCalls,S.calls,'calls');
  if(isRdv) checkMilestone(prevRdv,S.rdv,'rdv');
  saveStats(); updateStatBars();
  showOutcome(isRdv);
}

function showOutcome(isRdv){
  const pct=S.rate;
  const inner=document.getElementById('outcome-inner');
  inner.innerHTML=`
    <div class="outcome-icon">${isRdv?'🏆':'💪'}</div>
    <h2 class="outcome-title">${isRdv?'<em>RDV</em><br>décroché !':'Continue,<br><em>reste en jeu.</em>'}</h2>
    <p class="outcome-sub">${isRdv?`Série en cours : ${S.streak} RDV consécutif${S.streak>1?'s':''}.`:`Chaque "non" te rapproche du prochain "oui".`}</p>
    <div class="outcome-badges" style="width:100%">
      <div class="ob gold"><div class="ob-val">${S.calls}</div><div class="ob-label">Appels totaux</div></div>
      <div class="ob green"><div class="ob-val">${S.rdv}</div><div class="ob-label">RDV pris</div></div>
      <div class="ob gold"><div class="ob-val">${pct}</div><div class="ob-label">Taux</div></div>
    </div>
    <div class="outcome-btns">
      <button class="ob-cta primary" onclick="startCall()">📞 Prochain appel</button>
      <button class="ob-cta secondary" onclick="show('home')">← Retour accueil</button>
    </div>`;
  show('outcome');
}

// ══ INIT ══
loadStats(); updateStatBars();
</script>
</body>
</html>
